<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathLab — Práctica Matemática</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affcc;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --correct: #22c97a;
    --wrong: #ff4d6d;
    --warn: #ffb347;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; }

  /* ═══ HEADER ═══ */
  header {
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  .logo-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--accent3);
    letter-spacing: 1px;
  }

  /* ═══ SETUP ═══ */
  #setup-screen {
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.6rem);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 1rem;
  }

  .hero-title span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }

  .field-group { margin-bottom: 2rem; }

  .field-label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    margin-bottom: 0.7rem;
  }

  .num-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    padding: 0.6rem 1.1rem;
    width: 130px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .num-input::-webkit-outer-spin-button,
  .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .num-input:focus { border-color: var(--accent); }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 0.6rem;
    margin-bottom: 1rem;
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .topic-card:hover { border-color: var(--accent); background: var(--surface2); }
  .topic-card.selected { border-color: var(--accent); background: rgba(124,106,255,0.09); }

  .topic-card .check {
    width: 17px; height: 17px;
    border-radius: 4px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
    display: grid;
    place-items: center;
    transition: all 0.18s;
  }

  .topic-card.selected .check { background: var(--accent); border-color: var(--accent); }
  .topic-card.selected .check::after { content: '✓'; font-size: 10px; color: white; }

  .topic-name { font-size: 0.86rem; font-weight: 500; line-height: 1.3; }
  .topic-cat { font-size: 0.68rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .select-all-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.2rem;
    font-family: 'DM Sans', sans-serif;
  }
  .select-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  .start-btn {
    background: linear-gradient(135deg, var(--accent), #5b4df5);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.9rem 2.2rem;
    cursor: pointer;
    transition: all 0.22s;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 20px rgba(124,106,255,0.3);
    width: 100%;
    max-width: 280px;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,106,255,0.45); }
  .start-btn:active { transform: translateY(0); }

  /* ═══ QUIZ ═══ */
  #quiz-screen { display: none; max-width: 860px; margin: 0 auto; padding: 1.5rem 1.2rem; }

  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 100px;
    height: 5px;
    margin-bottom: 1.8rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.4rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .problem-counter { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--muted); }

  .topic-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    padding: 3px 11px;
    color: var(--accent3);
    max-width: 55vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .problem-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.8rem;
    margin-bottom: 1.2rem;
  }

  .problem-label {
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 0.8rem;
  }

  .problem-text {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    line-height: 1.9;
    color: var(--text);
    word-break: break-word;
  }

  /* Math rendering */
  .math-expr sup { font-size: 0.62em; vertical-align: super; line-height: 0; }
  .math-expr sub { font-size: 0.62em; vertical-align: sub; line-height: 0; }
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 3px;
    font-size: 0.82em;
    line-height: 1.1;
  }
  .frac .num { border-bottom: 1.5px solid currentColor; padding: 0 4px 1px; text-align: center; }
  .frac .den { padding: 1px 4px 0; text-align: center; }

  /* Answer area */
  .answer-section { margin-bottom: 1.2rem; }

  .answer-label {
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 0.6rem;
  }

  .math-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 0.6rem;
  }

  .tb-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.74rem;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .tb-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,0.06); }
  .tb-btn:active { transform: scale(0.96); }

  .answer-display {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    min-height: 56px;
    padding: 0.85rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    color: var(--text);
    cursor: text;
    outline: none;
    line-height: 1.8;
    transition: border-color 0.2s;
    word-break: break-all;
  }
  .answer-display:focus { border-color: var(--accent); }
  .answer-display.correct { border-color: var(--correct); background: rgba(34,201,122,0.06); }
  .answer-display.wrong { border-color: var(--wrong); background: rgba(255,77,109,0.06); }

  .hidden-input {
    position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;
  }

  .feedback-box {
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    font-size: 0.87rem;
    line-height: 1.55;
    margin-bottom: 1rem;
    display: none;
    word-break: break-word;
  }
  .feedback-box.correct { background: rgba(34,201,122,0.1); border: 1px solid rgba(34,201,122,0.3); color: var(--correct); }
  .feedback-box.wrong { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--wrong); }
  .feedback-box .tip { color: var(--warn); margin-top: 0.5rem; font-size: 0.8rem; }

  .btn-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }

  .check-btn {
    background: linear-gradient(135deg, var(--accent), #5b4df5);
    border: none; border-radius: 10px;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; font-weight: 600;
    padding: 0.75rem 1.6rem;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 3px 14px rgba(124,106,255,0.25);
    touch-action: manipulation;
    flex: 1; min-width: 140px;
  }
  .check-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(124,106,255,0.4); }
  .check-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .next-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; font-weight: 500;
    padding: 0.75rem 1.6rem;
    cursor: pointer; transition: all 0.2s;
    display: none;
    touch-action: manipulation;
    flex: 1; min-width: 140px;
  }
  .next-btn:hover { border-color: var(--accent); color: var(--accent); }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 0.75rem 1rem;
    cursor: pointer; transition: all 0.2s;
    touch-action: manipulation;
  }
  .clear-btn:hover { border-color: var(--wrong); color: var(--wrong); }

  /* ═══ RESULTS ═══ */
  #results-screen { display: none; max-width: 680px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; }

  .score-ring {
    width: 150px; height: 150px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    margin: 0 auto 1.8rem;
    position: relative;
  }
  .score-ring-inner {
    width: 112px; height: 112px;
    border-radius: 50%;
    background: var(--bg);
    position: absolute;
    display: grid;
    place-items: center;
  }
  .score-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--text);
  }

  .results-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.4rem; }
  .results-sub { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }

  .result-items { text-align: left; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 0.6rem; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    font-size: 0.84rem;
    word-break: break-word;
  }
  .result-item .ri-icon { font-size: 0.95rem; flex-shrink: 0; margin-top: 1px; }
  .result-item.ok { border-color: rgba(34,201,122,0.2); }
  .result-item.bad { border-color: rgba(255,77,109,0.2); }
  .result-item .ri-q { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; margin-bottom: 2px; }
  .result-item .ri-a { color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem; }
  .result-item .ri-correct { color: var(--correct); font-size: 0.76rem; }

  .restart-btn {
    background: linear-gradient(135deg, var(--accent), #5b4df5);
    border: none; border-radius: 12px;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 600;
    padding: 0.85rem 2.2rem;
    cursor: pointer; transition: all 0.22s;
    box-shadow: 0 4px 20px rgba(124,106,255,0.3);
    touch-action: manipulation;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,106,255,0.45); }

  /* ═══ MODAL ═══ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    display: none;
    place-items: center;
    z-index: 999;
    padding: 1rem;
  }
  .modal-overlay.open { display: grid; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    width: min(380px, 100%);
    box-shadow: 0 20px 70px rgba(0,0,0,0.55);
  }

  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 1.1rem; color: var(--text); }

  .modal-field { margin-bottom: 0.9rem; }
  .modal-field label { display: block; font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 0.38rem; letter-spacing: 1px; text-transform: uppercase; }
  .modal-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    padding: 0.55rem 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-field input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.3rem; }
  .modal-cancel {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; padding: 0.55rem 1.1rem; cursor: pointer; transition: all 0.2s;
  }
  .modal-cancel:hover { border-color: var(--wrong); color: var(--wrong); }
  .modal-ok {
    background: var(--accent); border: none; border-radius: 8px;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 600; padding: 0.55rem 1.3rem; cursor: pointer; transition: all 0.2s;
  }
  .modal-ok:hover { background: #6a58f0; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor { display: inline-block; width: 2px; height: 1.05em; background: var(--accent); vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 1px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .animate-in { animation: fadeUp 0.35s ease forwards; }

  /* ═══ MOBILE ═══ */
  @media (max-width: 600px) {
    header { padding: 1rem 1rem; }
    .logo { font-size: 1.35rem; }

    #setup-screen { padding: 2rem 1rem; }
    .hero-sub { font-size: 0.92rem; }

    .topics-grid { grid-template-columns: 1fr 1fr; gap: 0.45rem; }
    .topic-name { font-size: 0.78rem; }
    .topic-cat { font-size: 0.62rem; }
    .topic-card { padding: 0.6rem 0.7rem; gap: 0.5rem; }
    .topic-card .check { width: 15px; height: 15px; }

    .start-btn { max-width: 100%; }

    #quiz-screen { padding: 1rem 0.85rem; }

    .problem-card { padding: 1.1rem 1rem; }
    .problem-text { font-size: 0.95rem; }

    .math-toolbar { gap: 0.28rem; }
    .tb-btn { font-size: 0.68rem; padding: 5px 7px; }

    .btn-row { gap: 0.5rem; }
    .check-btn, .next-btn { font-size: 0.85rem; padding: 0.7rem 1rem; min-width: 100px; }
    .clear-btn { font-size: 0.82rem; padding: 0.7rem 0.8rem; }

    #results-screen { padding: 2rem 1rem; }
    .results-title { font-size: 1.6rem; }
    .score-ring { width: 130px; height: 130px; }
    .score-ring-inner { width: 96px; height: 96px; }
    .score-num { font-size: 1.8rem; }
  }

  @media (max-width: 380px) {
    .topics-grid { grid-template-columns: 1fr; }
    .tb-btn { font-size: 0.65rem; padding: 5px 6px; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="logo">MathLab</div>
  <div class="logo-tag">v2.0</div>
</header>

<!-- SETUP -->
<div id="setup-screen">
  <h1 class="hero-title">Practica<br><span>Matemáticas</span><br>a tu ritmo.</h1>
  <p class="hero-sub">Genera problemas únicos de álgebra, factorización y ecuaciones.<br>Escribe respuestas con el teclado y usa los botones para insertar fracciones, exponentes y más.</p>

  <div class="field-group">
    <label class="field-label">Número de problemas</label>
    <input type="number" class="num-input" id="num-problems" value="10" min="1" max="100">
  </div>

  <div class="field-group">
    <label class="field-label">Temas a practicar</label>
    <button class="select-all-btn" onclick="toggleAllTopics()">Seleccionar / deseleccionar todos</button>
    <div class="topics-grid" id="topics-grid"></div>
  </div>

  <button class="start-btn" onclick="startQuiz()">Comenzar práctica →</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="quiz-meta">
    <span class="problem-counter" id="problem-counter">Problema 1 de 10</span>
    <span class="topic-badge" id="topic-badge">—</span>
  </div>

  <div class="problem-card animate-in" id="problem-card">
    <div class="problem-label">Problema</div>
    <div class="problem-text math-expr" id="problem-text"></div>
  </div>

  <div class="answer-section">
    <div class="answer-label">Tu respuesta</div>
    <div class="math-toolbar">
      <button class="tb-btn" onclick="insertFraction()">a/b Fracción</button>
      <button class="tb-btn" onclick="openModal('sup')">x² Superíndice</button>
      <button class="tb-btn" onclick="openModal('sub')">x₂ Subíndice</button>
      <button class="tb-btn" onclick="insertText('√')">√ Raíz</button>
      <button class="tb-btn" onclick="insertText('±')">±</button>
      <button class="tb-btn" onclick="insertText('(')">( </button>
      <button class="tb-btn" onclick="insertText(')')"> )</button>
      <button class="tb-btn" onclick="insertText('+')">+</button>
      <button class="tb-btn" onclick="insertText('-')">−</button>
      <button class="tb-btn" onclick="insertText('=')">=</button>
    </div>
    <div class="answer-display math-expr" id="answer-display" tabindex="0" onclick="focusHidden()"></div>
    <input class="hidden-input" id="hidden-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="feedback-box" id="feedback-box"></div>

  <div class="btn-row">
    <button class="check-btn" id="check-btn" onclick="checkAnswer()">Verificar respuesta</button>
    <button class="next-btn" id="next-btn" onclick="nextProblem()">Siguiente →</button>
    <button class="clear-btn" onclick="clearAnswer()">✕ Limpiar</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-screen">
  <div class="score-ring" id="score-ring">
    <div class="score-ring-inner">
      <div class="score-num" id="score-num">0/0</div>
    </div>
  </div>
  <h2 class="results-title" id="results-title">¡Bien hecho!</h2>
  <p class="results-sub" id="results-sub"></p>
  <div class="result-items" id="result-items"></div>
  <button class="restart-btn" onclick="goHome()">← Volver al inicio</button>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Insertar</div>
    <div id="modal-fields"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-ok" onclick="confirmModal()">Insertar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  TOPICS
// ══════════════════════════════════════════════════════════
const TOPICS = [
  { id: 'binomio_cubo',       name: 'Binomio al cubo',            cat: 'Productos Notables' },
  { id: 'factor_monomio',     name: 'Factor Común Monomio',        cat: 'Factorización' },
  { id: 'factor_polinomio',   name: 'Factor Común Polinomio',      cat: 'Factorización' },
  { id: 'factor_agrupacion',  name: 'Factor por Agrupación',       cat: 'Factorización' },
  { id: 'trinomio_cuadrado',  name: 'Trinomio Cuadrado Perfecto',  cat: 'Factorización' },
  { id: 'dif_cuadrados',      name: 'Diferencia de Cuadrados',     cat: 'Factorización' },
  { id: 'trinomio_xbxc',      name: 'Trinomio x²+bx+c',           cat: 'Factorización' },
  { id: 'ec_lineal',          name: 'Ecuaciones Lineales',         cat: 'Ecuaciones' },
  { id: 'ec_denominadores',   name: 'Ecuaciones con Denominadores',cat: 'Ecuaciones' },
];

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
const rnd  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const pick = arr  => arr[rnd(0,arr.length-1)];
const ab   = n    => Math.abs(n);

function gcd(a,b){ a=ab(a);b=ab(b); while(b){[a,b]=[b,a%b];} return a||1; }

const VARS = ['a','b','c','d','m','n','p','q','r','s','x','y','z'];
const rvar = () => pick(VARS);

// Pick N distinct vars
function rvarsN(n){
  const pool=[...VARS]; const out=[];
  while(out.length<n && pool.length){
    const i=rnd(0,pool.length-1);
    out.push(pool.splice(i,1)[0]);
  }
  return out;
}

// Safe coefficient string: omit 1 before variable
const cs = (n, hasVar=true) => (ab(n)===1 && hasVar) ? (n<0?'-':'') : String(n);
// Sign string
const sgn = n => n<0 ? '-' : '+';

// Fraction HTML
const frac = (n,d) =>
  `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`;

// Reduce fraction {n,d}
function reduce(n,d){ const g=gcd(ab(n),ab(d)); return {n:n/g, d:d/g}; }

// ══════════════════════════════════════════════════════════
//  GENERATORS  — each returns { questionHTML, answerHTML, topic, hint }
// ══════════════════════════════════════════════════════════

/* ── Binomio al cubo ─────────────────────────────────── */
function gen_binomio_cubo(){
  const [v1,v2] = rvarsN(2);
  const a=rnd(1,7), b=rnd(1,7), s=pick([1,-1]);
  const sStr = s>0?'+':'-';
  const aS=cs(a,true), bS=cs(b,true);

  const q = `(${aS}${v1} ${sStr} ${bS}${v2})<sup>3</sup> = ?`;

  // (A+B)³ = A³ + 3A²B + 3AB² + B³  where B = b*s
  const A=a, B=b*s;
  const c1=A**3, c2=3*A**2*B, c3=3*A*B**2, c4=B**3;

  function termHTML(coef, varStr, isFirst){
    if(coef===0) return '';
    const sign  = isFirst ? (coef<0?'-':'') : ` ${sgn(coef)} `;
    const cStr  = ab(coef)===1&&varStr ? '' : String(ab(coef));
    return sign+cStr+varStr;
  }
  const ans =
    termHTML(c1, `${v1}<sup>3</sup>`, true) +
    termHTML(c2, `${v1}<sup>2</sup>${v2}`, false) +
    termHTML(c3, `${v1}${v2}<sup>2</sup>`, false) +
    termHTML(c4, `${v2}<sup>3</sup>`, false);

  return { questionHTML:q, answerHTML:ans, topic:'binomio_cubo',
    hint:'Usa: (A±B)³ = A³ ± 3A²B + 3AB² ± B³' };
}

/* ── Factor Común Monomio ────────────────────────────── */
function gen_factor_monomio(){
  const [v1] = rvarsN(1);
  const k   = rnd(2,6);        // common factor coefficient
  const exp1= rnd(1,3);        // common exponent
  const nTerms = rnd(2,3);
  const inner=[], outer=[];
  const usedExps = new Set();

  for(let i=0;i<nTerms;i++){
    let c, e;
    // avoid identical inner terms
    let tries=0;
    do { c=rnd(1,7); e=rnd(0,3); tries++; } while(usedExps.has(`${c},${e}`) && tries<20);
    usedExps.add(`${c},${e}`);
    inner.push({c,e});
    outer.push({c:k*c, e:e+exp1});
  }

  // Question: sum of outer terms
  const qParts = outer.map((t,i)=>{
    const vp = t.e===1 ? v1 : t.e===0 ? '' : `${v1}<sup>${t.e}</sup>`;
    return (i>0?' + ':'')+t.c+(vp||'');
  });
  const qHTML = qParts.join('')+' = ?';

  // Answer: k·v1^exp1·(inner terms)
  const kVp = exp1===1 ? `${k}${v1}` : `${k}${v1}<sup>${exp1}</sup>`;
  const innerParts = inner.map((t,i)=>{
    const vp = t.e===0 ? '' : t.e===1 ? v1 : `${v1}<sup>${t.e}</sup>`;
    const cStr = (t.c===1 && vp) ? '' : String(t.c);
    return (i>0?' + ':'')+cStr+vp;
  });
  const answerHTML = `${kVp}(${innerParts.join('')})`;

  return { questionHTML:qHTML, answerHTML, topic:'factor_monomio',
    hint:'Extrae el factor común: el coeficiente y la variable con el menor exponente.' };
}

/* ── Factor Común Polinomio ──────────────────────────── */
function gen_factor_polinomio(){
  // Pattern: A·(P±Q) ± B·(P±Q) = (P±Q)·(A±B)
  // Guarantee the sign in the second group matches so the common factor is real
  const [p,q,v1,v2] = rvarsN(4);
  const s  = pick(['+','-']);
  const s2 = pick(['+','-']);  // sign between the two big terms
  const a  = rnd(2,5);         // coefficient ≥ 2 to avoid "1v"
  const b  = rnd(2,5);

  const aS = cs(a,true), bS = cs(b,true);
  const qHTML = `${aS}${v1}(${p} ${s} ${q}) ${s2} ${bS}${v2}(${p} ${s} ${q}) = ?`;
  const answerHTML = `(${p} ${s} ${q})(${aS}${v1} ${s2} ${bS}${v2})`;

  return { questionHTML:qHTML, answerHTML, topic:'factor_polinomio',
    hint:'Identifica el factor polinomio común entre los términos.' };
}

/* ── Factor por Agrupación ───────────────────────────── */
function gen_factor_agrupacion(){
  // (av1 + bv2)(cv3 + dv4) expanded = ac·v1v3 + ad·v1v4 + bc·v2v3 + bd·v2v4
  const [v1,v2,v3,v4] = rvarsN(4);
  // Coefficients ≥ 2 so no "1·var" appears in answer
  const a=rnd(2,6), b=rnd(2,6), c=rnd(2,6), d=rnd(2,6);

  const qHTML =
    `${a*c}${v1}${v3} + ${a*d}${v1}${v4} + ${b*c}${v2}${v3} + ${b*d}${v2}${v4} = ?`;
  const answerHTML = `(${a}${v1} + ${b}${v2})(${c}${v3} + ${d}${v4})`;

  return { questionHTML:qHTML, answerHTML, topic:'factor_agrupacion',
    hint:'Agrupa de dos en dos y saca el factor común de cada grupo.' };
}

/* ── Trinomio Cuadrado Perfecto ──────────────────────── */
function gen_trinomio_cuadrado(){
  const [v1,v2] = rvarsN(2);
  const a=rnd(1,9), b=rnd(1,9), s=pick([1,-1]);
  const sStr=s>0?'+':'-';

  const c1=a*a, c2=2*a*b, c3=b*b;
  const c1S = c1===1?'':String(c1);
  const c3S = c3===1?'':String(c3);
  const aS  = a===1?'':String(a);
  const bS  = b===1?'':String(b);

  const qHTML = `${c1S}${v1}<sup>2</sup> ${sStr} ${c2}${v1}${v2} + ${c3S}${v2}<sup>2</sup> = ?`;
  const answerHTML = `(${aS}${v1} ${sStr} ${bS}${v2})<sup>2</sup>`;

  return { questionHTML:qHTML, answerHTML, topic:'trinomio_cuadrado',
    hint:'Identifica: a² ± 2ab + b² = (a ± b)²' };
}

/* ── Diferencia de Cuadrados ─────────────────────────── */
function gen_dif_cuadrados(){
  const [v1,v2] = rvarsN(2);
  const useFrac = Math.random()<0.28;

  let qHTML, answerHTML;
  if(!useFrac){
    // Coefficients ≥ 2 so answer never shows "1v"
    const a=rnd(2,9), b=rnd(2,9);
    qHTML = `${a*a}${v1}<sup>2</sup> - ${b*b}${v2}<sup>2</sup> = ?`;
    answerHTML = `(${a}${v1} + ${b}${v2})(${a}${v1} - ${b}${v2})`;
  } else {
    // Pick two distinct irreducible fractions p/q with p,q≥2, p≠q
    let fn1,fd1,fn2,fd2, safety=0;
    do { fn1=rnd(2,5); fd1=rnd(2,7); safety++; }
    while((gcd(fn1,fd1)!==1 || fn1===fd1) && safety<40);
    safety=0;
    do { fn2=rnd(2,5); fd2=rnd(2,7); safety++; }
    while((gcd(fn2,fd2)!==1 || fn2===fd2 || (fn1===fn2&&fd1===fd2)) && safety<40);

    qHTML = `${frac(fn1*fn1,fd1*fd1)}${v1}<sup>2</sup> - ${frac(fn2*fn2,fd2*fd2)}${v2}<sup>2</sup> = ?`;
    answerHTML =
      `(${frac(fn1,fd1)}${v1} + ${frac(fn2,fd2)}${v2})`+
      `(${frac(fn1,fd1)}${v1} - ${frac(fn2,fd2)}${v2})`;
  }
  return { questionHTML:qHTML, answerHTML, topic:'dif_cuadrados',
    hint:'Usa: a² - b² = (a+b)(a-b)' };
}

/* ── Trinomio x²+bx+c ───────────────────────────────── */
function gen_trinomio_xbxc(){
  const v = pick(['x','y','m','n','t','z']);
  let p,q, tries=0;
  do {
    p=rnd(-9,9); q=rnd(-9,9); tries++;
  } while((p===0||q===0||p===q||p===-q) && tries<40);

  const b=p+q, c=p*q;
  // Skip trivial b=0 case (already excluded p===-q)
  const bAbs=ab(b), cAbs=ab(c);
  const bStr = b===0 ? '' : ` ${sgn(b)} ${bAbs}${v}`;
  const cStr = c===0 ? '' : ` ${sgn(c)} ${cAbs}`;

  const qHTML = `${v}<sup>2</sup>${bStr}${cStr} = ?`;
  const answerHTML =
    `(${v} ${sgn(p)} ${ab(p)})(${v} ${sgn(q)} ${ab(q)})`;

  return { questionHTML:qHTML, answerHTML, topic:'trinomio_xbxc',
    hint:'Busca p,q donde p·q = c y p+q = b' };
}

/* ── Ecuación Lineal ─────────────────────────────────── */
function gen_ec_lineal(){
  const v = pick(['x','y','t','m','n','k']);
  const type = rnd(1,3);
  let qHTML, answerHTML;

  if(type===1){
    // a·x + b = c  →  x = (c-b)/a  (integer solution)
    const a=rnd(2,9), b=rnd(1,14);
    const sol=rnd(1,10);
    const c=a*sol+b;
    qHTML = `${a}${v} + ${b} = ${c}`;
    answerHTML = `${v} = ${sol}`;

  } else if(type===2){
    // (a·x + b) / d = e  →  x = (e·d - b)/a
    // Build to guarantee integer OR clean fraction solution
    const a=rnd(2,6), d=rnd(2,6), sol=rnd(1,8);
    const b=rnd(0,8);
    const rhs = (a*sol+b); // numerator before dividing by d
    // rhs/d must equal e (integer) → make rhs divisible by d
    const rhs2 = rhs - (rhs%d); // round down
    const e = rhs2/d;
    const solFixed = (rhs2-b)/a;
    if(Number.isInteger(solFixed) && solFixed>0 && e>0){
      qHTML = `${frac(`${a}${v} + ${b}`,d)} = ${e}`;
      answerHTML = `${v} = ${solFixed}`;
    } else {
      // fraction answer
      const num2=e*d-b, g2=gcd(ab(num2),a);
      const sn=num2/g2, sd=a/g2;
      qHTML = `${frac(`${a}${v} + ${b}`,d)} = ${e}`;
      answerHTML = `${v} = ${frac(sn,sd)}`;
    }

  } else {
    // a·x² = b  → x = √(b/a), only perfect squares
    const a=pick([1,2,3,4,5]);
    const sol=rnd(2,9);
    const b=a*sol*sol;
    qHTML = a===1 ? `${v}<sup>2</sup> = ${b}` : `${a}${v}<sup>2</sup> = ${b}`;
    answerHTML = `${v} = ${sol}`;
  }

  return { questionHTML:qHTML, answerHTML, topic:'ec_lineal',
    hint:'Despeja la variable paso a paso.' };
}

/* ── Ecuación con Denominadores ─────────────────────── */
function gen_ec_denominadores(){
  const v = pick(['x','y','t','m','n']);
  const type = rnd(1,2);
  let qHTML, answerHTML;

  if(type===1){
    // Build guaranteed-integer problem:
    // (x + a)/d1 + (b·x + c)/d2 = e
    // Choose sol first, then derive e
    const sol=rnd(1,8);
    const d1=pick([2,3,4,6]), d2=pick([2,3,4,6]);
    const a=rnd(0,5), b=rnd(1,3), c=rnd(0,5);
    const lhsNum = (sol+a)*d2 + (b*sol+c)*d1;  // over d1*d2
    const denom  = d1*d2;
    // Reduce
    const g=gcd(ab(lhsNum),denom);
    const en=lhsNum/g, ed=denom/g;
    // Only use if result is integer
    if(ed===1){
      const e=en;
      const bS = b===1?'':String(b);
      const aS = a===0?'':`+ ${a}`;
      const cS = c===0?'':`+ ${c}`;
      qHTML = `${frac(`${v} ${aS}`,d1)} + ${frac(`${bS}${v} ${cS}`,d2)} = ${e}`;
      answerHTML = `${v} = ${sol}`;
    } else {
      // Retry with simpler numbers that guarantee integer
      const sol2=rnd(2,6);
      const d=pick([2,3,4]), d2b=pick([2,3,4]);
      const L=d*d2b;
      // coefs such that answer is integer
      const a2=rnd(0,3), b2=rnd(1,2), c2=rnd(0,3);
      const lhs2=(sol2+a2)*d2b + (b2*sol2+c2)*d;
      if(lhs2%L===0){
        const e2=lhs2/L;
        qHTML = `${frac(`${v} + ${a2}`,d)} + ${frac(`${b2}${v} + ${c2}`,d2b)} = ${e2}`;
        answerHTML = `${v} = ${sol2}`;
      } else {
        // ultimate safe fallback: 3x/2 + x/3 = k → x = 6k/11
        // just use a manually constructed one
        const sol3=rnd(2,8);
        const e3= sol3*7; // 3x/2 + 2x/1 = 7x/2 → nope, use:
        // x/2 + x/3 = e → 5x/6 = e → x=6e/5, want integer sol
        // sol3 must be mult of 5
        const sol4=5*rnd(1,4);
        const e4=sol4*5/6; // not integer either
        // Just do: x/2 + x/2 = sol3 → x = sol3
        qHTML = `${frac(`${v}`,2)} + ${frac(`${v}`,2)} = ${sol3}`;
        answerHTML = `${v} = ${sol3}`;
      }
    }

  } else {
    // (a·x)/d1 + (b·x)/d2 + (c·x)/d3 = e
    // Guarantee integer: find LCM, pick sol
    const d1=2, d2=3, d3=6;   // LCM = 6
    const L=6;
    const a=rnd(1,4), b=rnd(1,4), c=rnd(1,4);
    // sum of coefs over LCM: (a*3 + b*2 + c) / 6
    const num = a*3+b*2+c;
    // sol such that sol*num divisible by 6
    // pick sol = 6/gcd(num,6)
    const g=gcd(num,6);
    const sol=6/g;
    const e=sol*num/6;
    qHTML = `${frac(`${a}${v}`,d1)} + ${frac(`${b}${v}`,d2)} + ${frac(`${c}${v}`,d3)} = ${e}`;
    answerHTML = `${v} = ${sol}`;
  }

  return { questionHTML:qHTML, answerHTML, topic:'ec_denominadores',
    hint:'Multiplica ambos lados por el MCM de los denominadores.' };
}

// ══════════════════════════════════════════════════════════
//  GENERATOR MAP
// ══════════════════════════════════════════════════════════
const GENERATORS = {
  binomio_cubo:      gen_binomio_cubo,
  factor_monomio:    gen_factor_monomio,
  factor_polinomio:  gen_factor_polinomio,
  factor_agrupacion: gen_factor_agrupacion,
  trinomio_cuadrado: gen_trinomio_cuadrado,
  dif_cuadrados:     gen_dif_cuadrados,
  trinomio_xbxc:     gen_trinomio_xbxc,
  ec_lineal:         gen_ec_lineal,
  ec_denominadores:  gen_ec_denominadores,
};

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let problems=[], currentIdx=0, score=0, results=[];
let answerTokens=[];
let historyHashes=new Set();

// ══════════════════════════════════════════════════════════
//  SETUP SCREEN
// ══════════════════════════════════════════════════════════
function initTopicsGrid(){
  const grid=document.getElementById('topics-grid');
  grid.innerHTML='';
  TOPICS.forEach(t=>{
    const card=document.createElement('div');
    card.className='topic-card selected';
    card.dataset.id=t.id;
    card.innerHTML=`<div class="check"></div><div><div class="topic-name">${t.name}</div><div class="topic-cat">${t.cat}</div></div>`;
    card.addEventListener('click',()=>card.classList.toggle('selected'));
    grid.appendChild(card);
  });
}

function toggleAllTopics(){
  const cards=[...document.querySelectorAll('.topic-card')];
  const allSel=cards.every(c=>c.classList.contains('selected'));
  cards.forEach(c=>c.classList.toggle('selected',!allSel));
}

// ══════════════════════════════════════════════════════════
//  PROBLEM GENERATION (no repeats, respects topic selection)
// ══════════════════════════════════════════════════════════
function hashProblem(p){
  return p.questionHTML.replace(/<[^>]*>/g,'').replace(/\s+/g,'').slice(0,70);
}

function generateProblem(topicIds, attempts=0){
  if(attempts>50) return null;
  // CRITICAL: pick only from selected topics and NEVER fall back to a different topic
  const topicId=pick(topicIds);
  const gen=GENERATORS[topicId];
  if(!gen) return generateProblem(topicIds, attempts+1);
  let p;
  try { p=gen(); } catch(e){ return generateProblem(topicIds, attempts+1); }
  if(!p||!p.questionHTML) return generateProblem(topicIds, attempts+1);
  // Ensure the generated problem's topic is in the selected list
  // (some generators used to delegate to another generator — no longer, but double-check)
  if(!topicIds.includes(p.topic)) return generateProblem(topicIds, attempts+1);
  const h=hashProblem(p);
  if(historyHashes.has(h)) return generateProblem(topicIds, attempts+1);
  historyHashes.add(h);
  return p;
}

function startQuiz(){
  const n=parseInt(document.getElementById('num-problems').value);
  if(!n||n<1||n>100) return alert('Ingresa un número entre 1 y 100.');
  const sel=[...document.querySelectorAll('.topic-card.selected')].map(c=>c.dataset.id);
  if(sel.length===0) return alert('Selecciona al menos un tema.');

  historyHashes.clear();
  problems=[];
  for(let i=0;i<n;i++){
    const p=generateProblem(sel);
    if(p) problems.push(p);
  }
  if(problems.length===0) return alert('No se pudieron generar problemas. Intenta con más temas.');

  currentIdx=0; score=0; results=[];
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('results-screen').style.display='none';
  loadProblem();
}

function loadProblem(){
  const p=problems[currentIdx];
  const total=problems.length;
  document.getElementById('progress-fill').style.width=`${(currentIdx/total)*100}%`;
  document.getElementById('problem-counter').textContent=`Problema ${currentIdx+1} de ${total}`;
  document.getElementById('topic-badge').textContent=TOPICS.find(t=>t.id===p.topic)?.name||p.topic;
  document.getElementById('problem-text').innerHTML=p.questionHTML;

  answerTokens=[]; renderAnswer(); clearFeedback();
  document.getElementById('check-btn').disabled=false;
  document.getElementById('check-btn').style.display='';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('answer-display').className='answer-display math-expr';

  const card=document.getElementById('problem-card');
  card.classList.remove('animate-in');
  void card.offsetWidth;
  card.classList.add('animate-in');
  focusHidden();
}

// ══════════════════════════════════════════════════════════
//  ANSWER INPUT
// ══════════════════════════════════════════════════════════
function renderAnswer(){
  const d=document.getElementById('answer-display');
  d.innerHTML=answerTokens.map(t=>t.html).join('')+'<span class="cursor"></span>';
}

function getAnswerHTML(){ return answerTokens.map(t=>t.html).join(''); }

function focusHidden(){ document.getElementById('hidden-input').focus(); }

function escH(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('hidden-input').addEventListener('keydown',function(e){
  if(e.key==='Backspace'){ answerTokens.pop(); renderAnswer(); e.preventDefault(); return; }
  if(e.key==='Enter'){ checkAnswer(); e.preventDefault(); }
});

document.getElementById('hidden-input').addEventListener('input',function(){
  const val=this.value; this.value='';
  if(!val) return;
  for(const ch of val) answerTokens.push({type:'text',raw:ch,html:escH(ch)});
  renderAnswer();
});

function insertText(str){
  for(const ch of str) answerTokens.push({type:'text',raw:ch,html:escH(ch)});
  renderAnswer(); focusHidden();
}

function clearAnswer(){
  answerTokens=[];
  renderAnswer();
  document.getElementById('answer-display').className='answer-display math-expr';
  clearFeedback(); focusHidden();
}

// ══════════════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════════════
let modalType=null;

function openModal(type){
  modalType=type;
  const title=document.getElementById('modal-title');
  const fields=document.getElementById('modal-fields');
  if(type==='sup'){
    title.textContent='Insertar Superíndice';
    fields.innerHTML=`
      <div class="modal-field"><label>Base</label><input id="m-base" placeholder="x"></div>
      <div class="modal-field"><label>Exponente</label><input id="m-exp" placeholder="2"></div>`;
  } else {
    title.textContent='Insertar Subíndice';
    fields.innerHTML=`
      <div class="modal-field"><label>Símbolo</label><input id="m-base" placeholder="x"></div>
      <div class="modal-field"><label>Subíndice</label><input id="m-exp" placeholder="1"></div>`;
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.querySelector('#modal-fields input')?.focus(),80);
}

function insertFraction(){
  modalType='frac';
  document.getElementById('modal-title').textContent='Insertar Fracción';
  document.getElementById('modal-fields').innerHTML=`
    <div class="modal-field"><label>Numerador</label><input id="m-num" placeholder="1"></div>
    <div class="modal-field"><label>Denominador</label><input id="m-den" placeholder="2"></div>`;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-num')?.focus(),80);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  modalType=null; focusHidden();
}

function confirmModal(){
  if(modalType==='sup'||modalType==='sub'){
    const base=(document.getElementById('m-base')?.value||'').trim();
    const exp =(document.getElementById('m-exp')?.value||'').trim();
    if(!exp){ closeModal(); return; }
    const tag=modalType==='sup'?'sup':'sub';
    answerTokens.push({type:modalType, raw:base+'^'+exp,
      html: escH(base)+`<${tag}>${escH(exp)}</${tag}>`});
  } else if(modalType==='frac'){
    const num=(document.getElementById('m-num')?.value||'').trim();
    const den=(document.getElementById('m-den')?.value||'').trim();
    if(!num||!den){ closeModal(); return; }
    answerTokens.push({type:'frac', raw:`(${num}/${den})`,
      html:frac(escH(num),escH(den))});
  }
  renderAnswer(); closeModal();
}

document.getElementById('modal-overlay').addEventListener('keydown',e=>{
  if(e.key==='Enter') confirmModal();
  if(e.key==='Escape') closeModal();
});

// ══════════════════════════════════════════════════════════
//  ANSWER CHECKING
// ══════════════════════════════════════════════════════════

/* Strip HTML → canonical algebraic string */
function normalizeExpr(html){
  let s=html;
  // frac spans → (n/d)
  s=s.replace(/<span[^>]*class="frac"[^>]*>[\s\S]*?<span[^>]*class="num"[^>]*>([\s\S]*?)<\/span>[\s\S]*?<span[^>]*class="den"[^>]*>([\s\S]*?)<\/span>[\s\S]*?<\/span>/g,
    (_,n,d)=>{
      const nn=n.replace(/<[^>]+>/g,'').trim();
      const dd=d.replace(/<[^>]+>/g,'').trim();
      // reduce if numeric
      const ni=parseInt(nn), di=parseInt(dd);
      if(!isNaN(ni)&&!isNaN(di)&&di!==0){const g=gcd(ab(ni),ab(di));return`(${ni/g}/${di/g})`;}
      return `(${nn}/${dd})`;
    });
  // sup/sub
  s=s.replace(/<sup>([\s\S]*?)<\/sup>/g,'^$1');
  s=s.replace(/<sub>([\s\S]*?)<\/sub>/g,'_$1');
  // remove remaining tags
  s=s.replace(/<[^>]+>/g,'');
  // decode entities
  s=s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  // remove spaces
  s=s.replace(/\s+/g,'');
  s=s.toLowerCase();
  // implicit coefficient 1: "1x" → "x" (letter follows 1)
  // applied at start or after operator/paren
  let prev='';
  while(prev!==s){
    prev=s;
    s=s.replace(/(^|[+\-*(,|])1([a-z])/g,'$1$2');
  }
  // exponent 1: x^1 → x
  s=s.replace(/\^1([^0-9]|$)/g,'$1');
  return s;
}

/* Split at top-level occurrences of any char in delims */
function splitTop(s, delims){
  const parts=[], signs=[];
  let depth=0, cur='';
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if('([{'.includes(c)){depth++;cur+=c;}
    else if(')]}'.includes(c)){depth--;cur+=c;}
    else if(depth===0&&delims.includes(c)){
      if(cur) parts.push(cur);
      signs.push(c);
      cur='';
    } else cur+=c;
  }
  if(cur) parts.push(cur);
  return parts;
}

/* Extract content of top-level paren groups */
function extractGroups(s){
  const groups=[]; let depth=0,cur='',inside=false;
  for(const c of s){
    if(c==='('&&depth===0){depth=1;inside=true;cur='';}
    else if(c===')'&&depth===1){depth=0;if(cur)groups.push(cur);cur='';inside=false;}
    else if(c==='('&&depth>0){depth++;cur+=c;}
    else if(c===')'&&depth>1){depth--;cur+=c;}
    else if(inside) cur+=c;
  }
  return groups;
}

/* Normalize to canonical form for comparison */
function canonical(s){
  s=s.trim();
  // Product of paren groups: sort each group internally then sort groups
  const grps=extractGroups(s);
  if(grps.length>1){
    const normed=grps.map(g=>'('+canonical(g)+')');
    normed.sort();
    return normed.join('');
  }
  // Additive terms: sort
  const terms=splitTop(s,['+','-']);
  if(terms.length>1){
    return terms.map(t=>canonical(t.replace(/^[+]/,''))).sort().join('+');
  }
  return s;
}

function answersMatch(userHTML, correctHTML){
  const u=normalizeExpr(userHTML);
  const c=normalizeExpr(correctHTML);
  if(u===c) return true;
  if(canonical(u)===canonical(c)) return true;
  // Also try stripping outer parens from both
  const strip=s=>s.replace(/^\((.+)\)$/,(_,m)=>m);
  if(strip(u)===strip(c)) return true;
  if(canonical(strip(u))===canonical(strip(c))) return true;
  return false;
}

function checkAnswer(){
  if(answerTokens.length===0) return;
  const p=problems[currentIdx];
  const userHTML=getAnswerHTML();
  const correct=answersMatch(userHTML,p.answerHTML);

  const disp=document.getElementById('answer-display');
  const fb=document.getElementById('feedback-box');
  disp.className='answer-display math-expr '+(correct?'correct':'wrong');
  fb.style.display='block';
  fb.className='feedback-box '+(correct?'correct':'wrong');

  if(correct){
    // Check if just different order
    const u=normalizeExpr(userHTML), c=normalizeExpr(p.answerHTML);
    const tip=(u!==c)
      ? `<div class="tip">💡 Tu respuesta es correcta. Convencionalmente se ordena: <span class="math-expr">${p.answerHTML}</span></div>`
      : '';
    fb.innerHTML=`✓ ¡Correcto!${tip}`;
    score++;
  } else {
    fb.innerHTML=`✗ Incorrecto. La respuesta correcta es:<br><strong class="math-expr">${p.answerHTML}</strong>`+
      (p.hint?`<div class="tip">💡 ${p.hint}</div>`:'');
  }

  results.push({problem:p, userHTML, correct});
  document.getElementById('check-btn').disabled=true;
  document.getElementById('next-btn').style.display='inline-block';
  document.getElementById('next-btn').textContent=
    currentIdx+1<problems.length?'Siguiente →':'Ver resultados →';
}

function clearFeedback(){
  const fb=document.getElementById('feedback-box');
  fb.style.display='none'; fb.innerHTML=''; fb.className='feedback-box';
}

function nextProblem(){
  currentIdx++;
  if(currentIdx>=problems.length) showResults();
  else loadProblem();
}

// ══════════════════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════════════════
function showResults(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';

  const total=results.length;
  const pct=total>0?Math.round((score/total)*100):0;

  // Score ring via SVG
  const ring=document.getElementById('score-ring');
  const r=65, circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  ring.style.background='none';
  ring.innerHTML=`
    <svg width="150" height="150" style="position:absolute;top:0;left:0;">
      <circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--surface)" stroke-width="10"/>
      <circle cx="75" cy="75" r="${r}" fill="none"
        stroke="url(#rg)" stroke-width="10" stroke-linecap="round"
        stroke-dasharray="${dash} ${circ}"
        transform="rotate(-90 75 75)"/>
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="var(--accent)"/>
          <stop offset="100%" stop-color="var(--accent2)"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="score-ring-inner"><div class="score-num">${score}/${total}</div></div>`;

  const title=pct>=90?'¡Excelente!':pct>=75?'¡Muy bien!':pct>=50?'¡Bien!':'¡Sigue practicando!';
  document.getElementById('results-title').textContent=title;
  document.getElementById('results-sub').textContent=
    `Obtuviste ${score} de ${total} correctas (${pct}%)`;

  const container=document.getElementById('result-items');
  container.innerHTML='';
  results.forEach((r,i)=>{
    const item=document.createElement('div');
    item.className='result-item '+(r.correct?'ok':'bad');
    const qText=r.problem.questionHTML.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim().slice(0,55);
    item.innerHTML=`
      <span class="ri-icon">${r.correct?'✅':'❌'}</span>
      <div>
        <div class="ri-q">${i+1}. ${qText}</div>
        <div class="ri-a">Tu resp: <span class="math-expr">${r.userHTML||'—'}</span></div>
        ${!r.correct?`<div class="ri-correct">Correcto: <span class="math-expr">${r.problem.answerHTML}</span></div>`:''}
      </div>`;
    container.appendChild(item);
  });
}

function goHome(){
  document.getElementById('results-screen').style.display='none';
  document.getElementById('setup-screen').style.display='block';
}
