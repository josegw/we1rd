<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personaje hablando 8-bit</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0d0d12;
  color: white;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.scene {
  text-align: center;
}

#character {
  width: 260px;
  image-rendering: pixelated;
  transform-origin: bottom center;
  transition: transform 0.06s linear;
}

.talk-left {
  transform: translateX(-10px) translateY(-8px) rotate(-3deg);
}

.talk-right {
  transform: translateX(10px) translateY(-8px) rotate(3deg);
}

.dialogue-box {
  margin-top: 25px;
  width: 80vw;
  max-width: 700px;
  min-height: 110px;
  border: 4px solid white;
  background: #050505;
  padding: 20px;
  font-size: 22px;
  line-height: 1.5;
  text-align: left;
  box-shadow: 0 0 0 4px #222;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  font-family: monospace;
  font-size: 18px;
  cursor: pointer;
  background: white;
  color: black;
  border: none;
}
</style>
</head>

<body>

<div class="scene">
  <img id="character" src="personaje.png" alt="Personaje">

  <div class="dialogue-box" id="dialogue"></div>

  <button id="startBtn">Iniciar diálogo</button>
</div>

<script>
const text = `Hola... soy Jimbo. Parece que esta partida apenas comienza, pero algo raro está pasando aquí.`;

const dialogue = document.getElementById("dialogue");
const character = document.getElementById("character");
const startBtn = document.getElementById("startBtn");

let speakingSide = false;
let isTyping = false;

const sounds = [];

function preloadSounds() {
  for (let i = 0; i < 12; i++) {
    const sound = new Audio("audio.mp3");
    sound.preload = "auto";
    sound.volume = 0.35;
    sounds.push(sound);
  }
}

function unlockSounds() {
  sounds.forEach(sound => {
    sound.muted = true;
    sound.play()
      .then(() => {
        sound.pause();
        sound.currentTime = 0;
        sound.muted = false;
      })
      .catch(() => {});
  });
}

function getSound() {
  const sound = sounds.find(s => s.paused) || sounds[0];
  sound.pause();
  sound.currentTime = 0;
  return sound;
}

function playBlip(char) {
  if (char === " ") return;

  const sound = getSound();

  if ("aeiouáéíóú".includes(char.toLowerCase())) {
    sound.playbackRate = 1.15;
    sound.volume = 0.38;
  } else if (".,;:!?".includes(char)) {
    sound.playbackRate = 0.85;
    sound.volume = 0.22;
  } else {
    sound.playbackRate = 1;
    sound.volume = 0.32;
  }

  sound.play().catch(() => {});
}

function moveCharacter() {
  speakingSide = !speakingSide;

  character.classList.remove("talk-left", "talk-right");
  character.classList.add(speakingSide ? "talk-left" : "talk-right");

  setTimeout(() => {
    character.classList.remove("talk-left", "talk-right");
  }, 70);
}

function getDelay(char) {
  if (char === ".") return 280;
  if (char === ",") return 160;
  if (char === "!" || char === "?") return 230;
  if (char === " ") return 35;
  return 45;
}

function startDialogue() {
  if (isTyping) return;

  isTyping = true;
  dialogue.textContent = "";
  startBtn.textContent = "Hablando...";

  unlockSounds();

  let i = 0;

  function typeNext() {
    if (i >= text.length) {
      isTyping = false;
      startBtn.textContent = "Repetir diálogo";
      character.classList.remove("talk-left", "talk-right");
      return;
    }

    const char = text[i];
    dialogue.textContent += char;

    if (char !== " ") {
      playBlip(char);
      moveCharacter();
    }

    i++;
    setTimeout(typeNext, getDelay(char));
  }

  setTimeout(typeNext, 150);
}

preloadSounds();

startBtn.addEventListener("click", startDialogue);
</script>

</body>
</html>
