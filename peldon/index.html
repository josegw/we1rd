<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personaje hablando 8-bit</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0d0d12;
  color: white;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.scene {
  text-align: center;
}

#character {
  width: 260px;
  image-rendering: pixelated;
  transform-origin: bottom center;
  transition: transform 0.035s linear;
  will-change: transform;
}

.talk-left {
  transform: translateX(-10px) translateY(-8px) rotate(-3deg);
}

.talk-right {
  transform: translateX(10px) translateY(-8px) rotate(3deg);
}

.dialogue-box {
  margin-top: 25px;
  width: 80vw;
  max-width: 700px;
  min-height: 110px;
  border: 4px solid white;
  background: #050505;
  padding: 20px;
  font-size: 22px;
  line-height: 1.5;
  text-align: left;
  box-shadow: 0 0 0 4px #222;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  font-family: monospace;
  font-size: 18px;
  cursor: pointer;
  background: white;
  color: black;
  border: none;
}
</style>
</head>

<body>

<div class="scene">
  <img id="character" src="personaje.png" alt="Personaje">

  <div class="dialogue-box" id="dialogue"></div>

  <button id="startBtn">Iniciar diálogo</button>
</div>

<script>
const text = `Hola... soy Jimbo. Parece que esta partida apenas comienza, pero algo raro está pasando aquí.`;

const dialogue = document.getElementById("dialogue");
const character = document.getElementById("character");
const startBtn = document.getElementById("startBtn");

let audioCtx;
let isTyping = false;
let speakingSide = false;

const charsPerSecond = 72;
const blipsPerSecond = 24;
const movesPerSecond = 15;

async function unlockAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }
}

function play8BitBlip(char) {
  if (!audioCtx || !char || char === " ") return;

  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";

  if ("aeiouáéíóú".includes(char.toLowerCase())) {
    osc.frequency.value = 620;
  } else if (".,;:!?".includes(char)) {
    osc.frequency.value = 380;
  } else {
    osc.frequency.value = 520;
  }

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.18, now + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.035);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + 0.04);
}

function moveCharacter() {
  speakingSide = !speakingSide;

  character.classList.remove("talk-left", "talk-right");
  character.classList.add(speakingSide ? "talk-left" : "talk-right");

  setTimeout(() => {
    character.classList.remove("talk-left", "talk-right");
  }, 40);
}

function getVisibleChars(elapsedMs) {
  let count = 0;
  let time = 0;

  for (let i = 0; i < text.length; i++) {
    let delay = 1000 / charsPerSecond;

    if (text[i] === ".") delay += 110;
    if (text[i] === ",") delay += 60;
    if (text[i] === "!" || text[i] === "?") delay += 90;

    time += delay;

    if (time <= elapsedMs) count++;
    else break;
  }

  return count;
}

async function startDialogue() {
  if (isTyping) return;

  await unlockAudio();

  isTyping = true;
  dialogue.textContent = "";
  startBtn.textContent = "Hablando...";

  const startTime = performance.now();

  let lastChars = 0;
  let lastBlipStep = -1;
  let lastMoveStep = -1;

  function animate(now) {
    const elapsed = now - startTime;
    const charsToShow = Math.min(getVisibleChars(elapsed), text.length);

    if (charsToShow !== lastChars) {
      dialogue.textContent = text.slice(0, charsToShow);
      lastChars = charsToShow;
    }

    const currentChar = text[charsToShow - 1];

    const blipStep = Math.floor(elapsed / (1000 / blipsPerSecond));
    const moveStep = Math.floor(elapsed / (1000 / movesPerSecond));

    if (charsToShow < text.length && currentChar && currentChar !== " ") {
      if (blipStep !== lastBlipStep) {
        play8BitBlip(currentChar);
        lastBlipStep = blipStep;
      }

      if (moveStep !== lastMoveStep) {
        moveCharacter();
        lastMoveStep = moveStep;
      }
    }

    if (charsToShow < text.length) {
      requestAnimationFrame(animate);
    } else {
      isTyping = false;
      startBtn.textContent = "Repetir diálogo";
      character.classList.remove("talk-left", "talk-right");
    }
  }

  requestAnimationFrame(animate);
}

startBtn.addEventListener("click", startDialogue);
</script>

</body>
</html>
