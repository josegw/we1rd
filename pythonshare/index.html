            gap: 0;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;

        .panel-title {
            background: #252526;
            padding: 10px 15px;
            border-bottom: 1px solid #3e3e42;
            color: #858585;
            font-size: 12px;
            font-weight: 600;

        .panel-body {

            color: #d4d4d4;
            border: none;

            font-size: 13px;
            line-height: 1.6;

        .controls {

            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;

        button:hover:not(:disabled) { background: #1177bb; }

        .btn-sec { background: #3e3e42; color: #d4d4d4; }
        .btn-sec:hover { background: #4e4e54; }

        .examples {
            margin-top: 15px;
            border-top: 1px solid #3e3e42;
            padding-top: 15px;
        }

        .examples summary {
            cursor: pointer;
            color: #4ec9b0;
            font-size: 12px;
            padding: 8px 0;
            user-select: none;
        }

        .examples-list { display: grid; gap: 6px; margin-top: 10px; }

        .example-btn {
            background: #3e3e42 !important;
            color: #d4d4d4 !important;
            padding: 6px 10px !important;
            font-size: 11px !important;
            text-align: left;
            border: none;
        }

        .example-btn:hover { background: #4e4e54 !important; }

        .terminal {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 13px;
        }

        .prompt { color: #6a9955; margin-bottom: 10px; }
        .output { color: #d4d4d4; }
        .error { color: #f48771; }
        .loading { color: #858585; font-style: italic; }

        .viewer-mode {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .viewer-mode.active { display: flex; }

        .viewer-header {
            background: #2d2d30;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e42;
            color: #858585;
            font-size: 13px;

            padding: 20px;

            background: #1e1e1e;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;

        .cmd-cursor {
            display: inline-block;
            width: 7px;
            height: 1em;
            background: #d4d4d4;
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: blink-cursor 1s step-end infinite;
        }

        @keyframes blink-cursor {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }

        .hidden-input-capture {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            border: none;
            outline: none;
            background: transparent;
            color: transparent;
            caret-color: transparent;
            font-size: 16px;
            padding: 0;
            margin: 0;

            border-top-color: #4ec9b0;

            margin-bottom: 20px;

        ::-webkit-scrollbar-thumb { background: #464647; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #5a5a5a; }

        @media (max-width: 768px) {

            .panel { border-right: none; border-bottom: 1px solid #3e3e42; }

        // Si el navegador no la soporta, cae automáticamente a LZString.
        const SOPORTA_DEFLATE = typeof CompressionStream !== 'undefined' && typeof DecompressionStream !== 'undefined';

        function bytesABase64Url(bytes) {
            let binario = '';
            for (let i = 0; i < bytes.length; i++) binario += String.fromCharCode(bytes[i]);
            return btoa(binario).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function base64UrlABytes(str) {
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            while (str.length % 4) str += '=';
            const binario = atob(str);
            const bytes = new Uint8Array(binario.length);
            for (let i = 0; i < binario.length; i++) bytes[i] = binario.charCodeAt(i);
            return bytes;
        }

        async function comprimirTexto(texto) {
            const datos = new TextEncoder().encode(texto);
            const cs = new CompressionStream('deflate-raw');
            const writer = cs.writable.getWriter();
            writer.write(datos);
            writer.close();
            const comprimido = await new Response(cs.readable).arrayBuffer();
            return bytesABase64Url(new Uint8Array(comprimido));
        }

        async function descomprimirTexto(codificado) {
            const bytes = base64UrlABytes(codificado);
            const ds = new DecompressionStream('deflate-raw');
            const writer = ds.writable.getWriter();
            writer.write(bytes);
            writer.close();
            const descomprimido = await new Response(ds.readable).arrayBuffer();
            return new TextDecoder().decode(descomprimido);
        }

        // Transforma input(...) y time.sleep(...) en llamadas asíncronas, respetando
        // paréntesis anidados, strings y encadenamiento de métodos como .lower()/.strip()
        function transformarCodigo(codigo) {
            const reemplazos = [
                { patron: 'input', llamada: '_input' },
                { patron: 'time.sleep', llamada: '_sleep' }
            ];
            const n = codigo.length;
            let resultado = '';
            let i = 0;

            const esIdentChar = (c) => !!c && /[A-Za-z0-9_.]/.test(c);

            function coincideAqui(pos, patron) {
                if (codigo.substr(pos, patron.length) !== patron) return false;
                if (esIdentChar(codigo[pos - 1])) return false;
                let j = pos + patron.length;
                while (codigo[j] === ' ' || codigo[j] === '\t') j++;
                return codigo[j] === '(';
            }

            while (i < n) {
                const c = codigo[i];

                // saltar comentarios de línea sin tocarlos
                if (c === '#') {
                    let fin = codigo.indexOf('\n', i);
                    if (fin === -1) fin = n;
                    resultado += codigo.slice(i, fin);
                    i = fin;
                    continue;
                }

                // saltar strings (comillas simples/dobles/triples) sin tocarlas
                if (c === '"' || c === "'") {
                    const triple = codigo.substr(i, 3) === c.repeat(3);
                    const delim = triple ? c.repeat(3) : c;
                    let j = i + delim.length;
                    while (j < n) {
                        if (codigo[j] === '\\') { j += 2; continue; }
                        if (codigo.substr(j, delim.length) === delim) { j += delim.length; break; }
                        j++;
                    }
                    resultado += codigo.slice(i, j);
                    i = j;
                    continue;
                }

                let coincidio = false;
                for (const { patron, llamada } of reemplazos) {
                    if (coincideAqui(i, patron)) {
                        let j = i + patron.length;
                        while (codigo[j] === ' ' || codigo[j] === '\t') j++;

                        // encontrar el paréntesis de cierre correspondiente, respetando anidados y strings
                        let profundidad = 0;
                        let k = j;
                        let dentroString = null;
                        for (; k < n; k++) {
                            const ch = codigo[k];
                            if (dentroString) {
                                if (ch === '\\') { k++; continue; }
                                if (codigo.substr(k, dentroString.length) === dentroString) {
                                    k += dentroString.length - 1;
                                    dentroString = null;
                                }
                                continue;
                            }
                            if (ch === '"' || ch === "'") {
                                const triple = codigo.substr(k, 3) === ch.repeat(3);
                                dentroString = triple ? ch.repeat(3) : ch;
                                k += dentroString.length - 1;
                                continue;
                            }
                            if (ch === '(') profundidad++;
                            else if (ch === ')') {
                                profundidad--;
                                if (profundidad === 0) break;
                            }
                        }

                        const argumentos = codigo.slice(j, k + 1);
                        resultado += '(await ' + llamada + argumentos + ')';
                        i = k + 1;
                        coincidio = true;
                        break;
                    }
                }
                if (coincidio) continue;

                resultado += c;
                i++;
            }

            return resultado;
        }

        async function ejecutarCodigo(codigo) {
            try {

                // Detectar funciones que contienen await
const funcionesAsync = [];

const lineas = codeForExecution.split('\n');

for (let i = 0; i < lineas.length; i++) {
    const linea = lineas[i];

    const m = linea.match(/^(\s*)def\s+([A-Za-z_][A-Za-z0-9_]*)\s*\(/);

    if (!m) continue;

    const indent = m[1].length;
    const nombre = m[2];

    for (let j = i + 1; j < lineas.length; j++) {

        const l = lineas[j];

        if (l.trim() === "") continue;

        const espacios = l.match(/^ */)[0].length;

        if (espacios <= indent)
            break;

        if (l.includes("await ")) {
            funcionesAsync.push(nombre);
            lineas[i] = linea.replace(/^(\s*)def\b/, "$1async def");
            break;
        }
    }
}

let codigoFinal = lineas.join("\n");

for (const nombre of funcionesAsync) {
    const re = new RegExp(
        `(?<!def\\s)(?<!async\\sdef\\s)\\b${nombre}\\s*\\(`,
        "g"
    );

    codigoFinal = codigoFinal.replace(re, `await ${nombre}(`);
}

            } else {
                document.getElementById('viewerMode').classList.remove('active');
                document.getElementById('editorMode').classList.remove('hidden');
            }
        }

        function showLoadingError(msg) {
            showApplication();
            mostrarError(msg);
        }

        function escapar(texto) {
            const div = document.createElement('div');
            div.textContent = String(texto);
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            inicializar();

            const hiddenInput = document.getElementById('hiddenInput');
            if (hiddenInput) {
                hiddenInput.addEventListener('input', () => {
                    if (currentInputSpan) {
                        currentInputSpan.textContent = hiddenInput.value;
                        const target = isViewer ? document.getElementById('viewerTerminal') : document.getElementById('terminal');
                        target.scrollTop = target.scrollHeight;
                    }
                });

                hiddenInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && inputResolver) {
                        e.preventDefault();
                        finalizarInput(hiddenInput.value);
                    }
                });
            }

            // Permite tocar/clickear la terminal para reenfocar el input invisible (útil en móvil)
            ['terminal', 'viewerTerminal'].forEach((id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('click', () => {
                        if (inputResolver) hiddenInput.focus();
                    });
                }
            });

            const editor = document.getElementById('editor');
            if (editor) {
                editor.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'Enter') ejecutar();
                });
            }

            window.addEventListener('error', (event) => {
                if (document.getElementById('loadingScreen').classList.contains('active')) {
                    showLoadingError('Error de JavaScript: ' + event.message);
                }
            });

            window.addEventListener('unhandledrejection', (event) => {
                if (document.getElementById('loadingScreen').classList.contains('active')) {
                    showLoadingError('Error en promesa: ' + String(event.reason));
                }
            });
        });
    </script>
</body>
</html>
