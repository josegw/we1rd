<!DOCTYPE html>
<html lang="es">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Contable</title>

<style>
:root{
--azul:#1e3a8a;
--gris:#f3f4f6;
--verde:#16a34a;
--rojo:#dc2626;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--gris);
}

header{
background:var(--azul);
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input, select, button{
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:var(--azul);
color:white;
cursor:pointer;
border:none;
}

button:hover{opacity:0.9;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th, td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{background:#e5e7eb;}

.debe{text-align:left;padding-left:20px;}
.haber{text-align:right;padding-right:20px;}

.saldo-deudor{color:var(--rojo);font-weight:bold;}
.saldo-acreedor{color:var(--verde);font-weight:bold;}

.hidden{display:none;}

.tabs button{
margin:5px 5px 5px 0;
background:#374151;
}

.tabs button.active{
background:var(--azul);
}

.alert{
position:fixed;
top:20px;
right:20px;
background:var(--rojo);
color:white;
padding:15px;
border-radius:8px;
z-index:9999;
}

.btn-eliminar{
background:var(--rojo);
padding:4px 8px;
border-radius:4px;
cursor:pointer;
}

.btn-editar{
background:#f59e0b;
padding:6px 10px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

@media(max-width:768px){
table{font-size:13px;display:block;overflow-x:auto;}
.tabs{display:flex;flex-wrap:wrap;}
}

#modalCalc #calculator {
margin:0;
}

/* ===== CALCULADORA ===== */

#calculator {
position: relative;
border-radius: 7px;
margin: auto;
display: block;
width: 278px;
background-color: white;
font-size: 0.8em;
padding: 5px;
}

#smallResult {
position: absolute;
top: 3px;
right: 10px;
font-size:12px;
}

#result {
width: 100%;
padding: 15px 0px;
text-align: right;
font-size: 2.5em;
font-family: monospace;
background: inherit;
color: black;
}

/* 🔥 SOLO botones de calculadora */
#calculator button {
width: 60px;
height: 60px;
margin: 4px 2px;
outline: none;
border: none;
background: rgb(223, 223, 223);
color: black;
border-radius: 5px;
font-size: 1.4em;
}

#calculator button:active {
background: #bfbfbf;
}

#calculator button:nth-child(2) {
margin-left: 205px;
display: block;
background: #ef4a49;
color: white;
}

#calculator button:nth-child(6),
#calculator button:nth-child(10),
#calculator button:nth-child(14),
#calculator button:nth-child(17),
#calculator button:nth-child(18) {
background: #00b49a;
color: white;
}

</style>
</head>
<body>

<header id="tituloSistema" style="display:flex; justify-content:space-between; align-items:center;">

<span id="tituloTexto">TCN</span>

<button id="btnCalc" onclick="abrirCalculadora()" 
style="background:white; color:#1e3a8a; font-weight:bold; border-radius:6px;">
🧮
</button>

</header>

<div class="container">

<div id="inicio" class="card">
<h3>Nuevo Ejercicio</h3>
<input type="text" id="empresa" placeholder="Nombre de la empresa">
<input type="date" id="fecha">
<button onclick="iniciar()">Iniciar</button>

<!-- Añadido: carga de archivo .wtf sin tocar lo demás -->
<hr>
<h4>Cargar Ejercicio </h4>
<input type="file" id="cargarArchivo" accept=".wtf">
<button onclick="cargarWTFF()">Cargar Archivo</button>
</div>

<div id="sistema" class="hidden">

<div class="card">
<h3>Nueva Cuenta</h3>
<input type="text" id="nuevaCuenta" placeholder="Nombre de la nueva cuenta" onkeydown="if(event.key==='Enter'){agregarCuenta();}">
<button onclick="agregarCuenta()">Agregar Cuenta</button>
</div>

<div class="card">
<h3>Nueva Póliza</h3>

<select id="cuenta"></select>

<select id="tipo">
<option value="">Tipo</option>
<option value="Debe">Debe</option>
<option value="Haber">Haber</option>
</select>

<input type="number" id="monto" placeholder="Monto" onkeydown="if(event.key==='Enter'){agregarMovimiento();}">

<input type="date" id="fechaPoliza">

<button onclick="agregarMovimiento()">Agregar Movimiento</button>
<button onclick="finalizarPoliza()">Finalizar Póliza</button>
<button id="btnNota" onclick="abrirModalNota()">Añadir Nota</button>

<h4>Vista previa de póliza actual</h4>
<div id="previewPoliza"></div>
</div>

<div class="card">
<button onclick="cerrarEjercicio()">Cerrar Ejercicio</button>
</div>

<div class="card">
<h3>Libro Diario</h3>
<div class="tabs" id="tabsPolizas"></div>
<div id="visorPoliza"></div>
</div>

<div class="card">
<h3>Cuentas T</h3>
<div id="tcuentas"></div>
</div>

<div class="card">
<h3>Balanza de Comprobación</h3>
<div id="balanza"></div>
</div>

</div>
</div>

<script>

function generarPDF(nombreEmpresa){

  const empresa = document.getElementById("empresa").value || "";
  const fecha = document.getElementById("fecha").value || "";

  const contenedor = document.createElement("div");
  contenedor.style.cssText = "font-family:Arial,sans-serif;font-size:12px;color:#111;padding:20px;width:750px;";

  // Título
  const titulo = document.createElement("div");
  titulo.style.cssText = "background:#1e3a8a;color:white;padding:12px 16px;border-radius:8px;font-size:16px;margin-bottom:16px;font-weight:bold;";
  titulo.innerText = empresa + " | " + (fecha ? formatearFecha(fecha) : "");
  contenedor.appendChild(titulo);

  // Encabezado Libro Diario
  const h2polizas = document.createElement("div");
  h2polizas.style.cssText = "background:#374151;color:white;padding:8px 14px;border-radius:6px;font-size:14px;margin:0 0 12px;font-weight:bold;";
  h2polizas.innerText = "Libro Diario — Pólizas";
  contenedor.appendChild(h2polizas);

  // Pólizas
  polizas.forEach(p => {
    let d = 0, h = 0;

    const bloque = document.createElement("div");
    bloque.style.cssText = "margin-bottom:16px;border:1px solid #ddd;border-radius:8px;overflow:hidden;page-break-inside:avoid;";

    // Header de póliza
    const header = document.createElement("div");
    header.style.cssText = "display:flex;justify-content:space-between;background:#e5e7eb;padding:7px 12px;";
    header.innerHTML = `<span style="font-weight:bold;color:#1e3a8a;">Póliza ${p.numero}</span><span style="color:#374151;">${formatearFecha(p.fecha)}</span>`;
    bloque.appendChild(header);

    // Tabla
    const tabla = document.createElement("table");
    tabla.style.cssText = "width:100%;border-collapse:collapse;";

    const thead = document.createElement("thead");
    thead.innerHTML = `<tr>
      <th style="background:#e5e7eb;padding:6px 8px;text-align:center;border:1px solid #ccc;">Cuenta</th>
      <th style="background:#e5e7eb;padding:6px 8px;text-align:center;border:1px solid #ccc;">Debe</th>
      <th style="background:#e5e7eb;padding:6px 8px;text-align:center;border:1px solid #ccc;">Haber</th>
    </tr>`;
    tabla.appendChild(thead);

    const tbody = document.createElement("tbody");
    p.movimientos.forEach(m => {
      if(m.tipo === "Debe") d += m.monto; else h += m.monto;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="border:1px solid #ddd;padding:5px 8px;${m.tipo==='Debe'?'text-align:left;padding-left:16px;':'text-align:right;padding-right:16px;'}">${m.cuenta}</td>
        <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${m.tipo==='Debe'?formato(m.monto):''}</td>
        <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${m.tipo==='Haber'?formato(m.monto):''}</td>`;
      tbody.appendChild(tr);
    });
    tabla.appendChild(tbody);

    const tfoot = document.createElement("tfoot");
    tfoot.innerHTML = `<tr style="background:#f9fafb;font-weight:bold;">
      <td style="border:1px solid #ddd;padding:5px 8px;">Total</td>
      <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(d)}</td>
      <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(h)}</td>
    </tr>`;
    tabla.appendChild(tfoot);
    bloque.appendChild(tabla);

    // Nota
    if(p.nota && p.nota.trim()){
      const nota = document.createElement("div");
      nota.style.cssText = "background:#fef9c3;padding:6px 10px;font-size:11px;color:#555;";
      nota.innerText = "Nota: " + p.nota;
      bloque.appendChild(nota);
    }

    contenedor.appendChild(bloque);
  });

  // Encabezado Balanza
  const h2balanza = document.createElement("div");
  h2balanza.style.cssText = "background:#374151;color:white;padding:8px 14px;border-radius:6px;font-size:14px;margin:16px 0 12px;font-weight:bold;";
  h2balanza.innerText = "Balanza de Comprobación";
  contenedor.appendChild(h2balanza);

  // Tabla Balanza
  let cuentasT = {};
  polizas.forEach(p => {
    p.movimientos.forEach(m => {
      if(!cuentasT[m.cuenta]) cuentasT[m.cuenta] = {debe:0, haber:0};
      cuentasT[m.cuenta][m.tipo.toLowerCase()] += m.monto;
    });
  });

  let totalDebe=0, totalHaber=0, totalDeudor=0, totalAcreedor=0;
  const tablaB = document.createElement("table");
  tablaB.style.cssText = "width:100%;border-collapse:collapse;";
  tablaB.innerHTML = `<thead><tr>
    <th style="background:#e5e7eb;padding:6px 8px;border:1px solid #ccc;text-align:center;">Folio</th>
    <th style="background:#e5e7eb;padding:6px 8px;border:1px solid #ccc;text-align:center;">Cuenta</th>
    <th style="background:#e5e7eb;padding:6px 8px;border:1px solid #ccc;text-align:center;">Debe</th>
    <th style="background:#e5e7eb;padding:6px 8px;border:1px solid #ccc;text-align:center;">Haber</th>
    <th style="background:#e5e7eb;padding:6px 8px;border:1px solid #ccc;text-align:center;">Saldo Deudor</th>
    <th style="background:#e5e7eb;padding:6px 8px;border:1px solid #ccc;text-align:center;">Saldo Acreedor</th>
  </tr></thead>`;

  const tbodyB = document.createElement("tbody");
  let i = 1;
  for(let c in cuentasT){
    let d = cuentasT[c].debe;
    let h = cuentasT[c].haber;
    let saldo = d - h;
    totalDebe += d; totalHaber += h;
    if(saldo > 0) totalDeudor += saldo;
    if(saldo < 0) totalAcreedor += Math.abs(saldo);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${i}</td>
      <td style="border:1px solid #ddd;padding:5px 8px;">${c}</td>
      <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(d)}</td>
      <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(h)}</td>
      <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;color:${saldo>0?'#dc2626':''};font-weight:${saldo>0?'bold':'normal'};">${saldo>0?formato(saldo):''}</td>
      <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;color:${saldo<0?'#16a34a':''};font-weight:${saldo<0?'bold':'normal'};">${saldo<0?formato(Math.abs(saldo)):''}</td>`;
    tbodyB.appendChild(tr);
    i++;
  }

  // Fila totales
  const trTot = document.createElement("tr");
  trTot.style.cssText = "background:#f9fafb;font-weight:bold;";
  trTot.innerHTML = `
    <td colspan="2" style="border:1px solid #ddd;padding:5px 8px;">SUMAS IGUALES</td>
    <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(totalDebe)}</td>
    <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(totalHaber)}</td>
    <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(totalDeudor)}</td>
    <td style="border:1px solid #ddd;padding:5px 8px;text-align:center;">${formato(totalAcreedor)}</td>`;
  tbodyB.appendChild(trTot);
  tablaB.appendChild(tbodyB);
  contenedor.appendChild(tablaB);

  // Insertar en DOM oculto
  contenedor.style.position = "absolute";
  contenedor.style.left = "-9999px";
  contenedor.style.top = "0";
  document.body.appendChild(contenedor);

  const opciones = {
    margin: [10, 10, 10, 10],
    filename: (nombreEmpresa || "ejercicio") + "_reporte.pdf",
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
  };

  html2pdf().set(opciones).from(contenedor).save().then(() => {
    document.body.removeChild(contenedor);
  });
}
	
let polizas=[];
let polizaActual=[];
let numeroPoliza=1;
let cuentas = [
"Acreedores Diversos",
"Bancos",
"Caja",
"Capital",
"Clientes",
"Compras",
"Descuentos sobre Compras",
"Descuentos sobre Ventas",
"Deudores Diversos",
"Devoluciones sobre Compras",
"Devoluciones sobre Ventas",
"Documentos por Cobrar",
"Documentos por Pagar",
"Gastos de Administracion",
"Gastos de Compra",
"Gastos de Venta",
"Gastos y Productos Financieros",
"IVA Acreeditable",
"IVA Pendiente de Acreeditar",
"IVA Pendiente de Pago",
"IVA por Pagar",
"Mercancías",
"Mobiliario y Equipo",
"Papelería y Útiles",
"Proveedores",
"Ventas"
];
let editandoPoliza=null;

let polizaActualNota = "";

/* Añadido: variable para saber cuál pestaña está activa (no modifica lógica existente) */
let polizaActiva = null;

function guardarAuto(){
const datos={
empresa:document.getElementById("empresa")?.value || "",
fecha:document.getElementById("fecha")?.value || "",
polizas,
cuentas,
numeroPoliza
};
localStorage.setItem("ejercicio_contable_auto", JSON.stringify(datos));
}

function cargarAuto(){

const guardado = localStorage.getItem("ejercicio_contable_auto");
if(!guardado) return;

try{

const data = JSON.parse(guardado);

// Validaciones seguras
if(!data || !Array.isArray(data.polizas) || !Array.isArray(data.cuentas)){
console.log("Datos inválidos en almacenamiento");
return;
}

polizas = data.polizas;
cuentas = data.cuentas.length ? data.cuentas : cuentas;
numeroPoliza = data.numeroPoliza || (data.polizas.length + 1);

document.getElementById("empresa").value = data.empresa || "";
document.getElementById("fecha").value = data.fecha || "";

document.getElementById("inicio").classList.add("hidden");
document.getElementById("sistema").classList.remove("hidden");

renderSelectCuentas();
renderTodo();
actualizarTitulo();

}catch(e){
console.log("Error cargando guardado automático", e);
}

}

function mostrarError(msg){
const alerta=document.createElement("div");
alerta.className="alert";
alerta.innerText=msg;
document.body.appendChild(alerta);
setTimeout(()=>alerta.remove(),3000);
}

function actualizarBotonNota(){
const btn = document.getElementById("btnNota");
if(!btn) return;

if(polizaActualNota && polizaActualNota.trim() !== ""){
btn.innerText = "Editar Nota";
}else{
btn.innerText = "Añadir Nota";
}
}

function verNota(num){
const poliza = polizas.find(p=>p.numero===num);

document.getElementById("textoNotaVer").value = poliza.nota || "";
document.getElementById("modalVerNota").style.display = "flex";
}

function cerrarModalVerNota(){
document.getElementById("modalVerNota").style.display = "none";
}

function abrirModalNota(){
document.getElementById("modalNota").style.display = "flex";
document.getElementById("textoNota").value = polizaActualNota || "";
}

function cerrarModalNota(){
document.getElementById("modalNota").style.display = "none";
}

function guardarNota(){
const texto = document.getElementById("textoNota").value.trim();

polizaActualNota = texto;

actualizarBotonNota();
cerrarModalNota();

mostrarError("Nota guardada");
}

function formato(num){
return "$ "+Number(num).toLocaleString("es-MX",{minimumFractionDigits:2});
}

function formatearFecha(fechaISO){
const [anio,mes,dia]=fechaISO.split("-");
const fecha=new Date(anio, mes-1, dia);
return fecha.toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"});
}

function actualizarTitulo(){
const empresa=document.getElementById("empresa")?.value || "";
const fecha=document.getElementById("fecha")?.value || "";

if(empresa && fecha){
document.getElementById("tituloTexto").innerText =
empresa + " — " + formatearFecha(fecha);
}
}

function iniciar(){
const empresa=document.getElementById("empresa").value.trim();
const fecha=document.getElementById("fecha").value;

if(!empresa){mostrarError("Ingresa el nombre de la empresa.");return;}
if(!fecha){mostrarError("Selecciona la fecha.");return;}

document.getElementById("inicio").classList.add("hidden");
document.getElementById("sistema").classList.remove("hidden");

renderSelectCuentas();
renderTodo();
actualizarTitulo();
actualizarBotonNota();
}

function renderSelectCuentas(){
const select=document.getElementById("cuenta");
select.innerHTML='<option value="">Selecciona cuenta</option>';
if(!cuentas || cuentas.length === 0) return;

cuentas.forEach(c=>{
select.innerHTML += `<option>${c}</option>`;
});
}

function agregarCuenta(){
const nombre=document.getElementById("nuevaCuenta").value.trim();
if(!nombre){mostrarError("Escribe el nombre.");return;}
if(cuentas.includes(nombre)){mostrarError("La cuenta ya existe.");return;}
cuentas.push(nombre);
document.getElementById("nuevaCuenta").value="";
renderSelectCuentas();
}

function agregarMovimiento(){
const cuenta=document.getElementById("cuenta").value;
const tipo=document.getElementById("tipo").value;
const monto=parseFloat(document.getElementById("monto").value);
const fechaPoliza=document.getElementById("fechaPoliza");

if(!fechaPoliza.value){mostrarError("Selecciona la fecha de la póliza.");return;}

if(!cuenta){mostrarError("Selecciona una cuenta.");return;}
if(!tipo){mostrarError("Selecciona Debe o Haber.");return;}
if(!monto||monto<=0){mostrarError("El monto debe ser mayor a 0.");return;}

if(polizaActual.length===0){
fechaPoliza.disabled=true;
}

polizaActual.push({cuenta,tipo,monto});
document.getElementById("monto").value="";
renderPreview();
}

function eliminarMovimiento(index){
if(!confirm("¿Deseas eliminar este movimiento?")) return;
polizaActual.splice(index,1);
if(polizaActual.length===0){
document.getElementById("fechaPoliza").disabled=false;
}
renderPreview();
}

function editarMovimiento(index){

const fila=document.getElementById("mov_"+index);
const input=fila.querySelector("input");
const texto=fila.querySelector(".monto");
const boton=fila.querySelector(".btn-editar-mov");

if(boton.dataset.editando==="true"){

const nuevo=parseFloat(input.value);

if(!nuevo || nuevo<=0){
mostrarError("Monto inválido");
return;
}

polizaActual[index].monto=nuevo;

texto.innerText=formato(nuevo);

input.style.display="none";
texto.style.display="inline";

boton.innerText="✏";
boton.dataset.editando="false";

renderPreview();

}else{

texto.style.display="none";
input.style.display="inline";
input.focus();

boton.innerText="✔";
boton.dataset.editando="true";

}

}

function renderPreview(){
const fechaPoliza=document.getElementById("fechaPoliza").value;

let html=`<table>
<tr><th>Cuenta</th><th>Debe</th><th>Haber</th><th></th></tr>
<tr>
<td colspan="4" style="font-weight:bold;text-align:center;">
${fechaPoliza?formatearFecha(fechaPoliza):""}
</td>
</tr>`;
let d=0,h=0;

polizaActual.forEach((m,i)=>{
html+=`<tr id="mov_${i}">
<td class="${m.tipo==='Debe'?'debe':'haber'}">${m.cuenta}</td>

<td>
${m.tipo==='Debe'
?`<span class="monto">${formato(m.monto)}</span>
<input type="number" value="${m.monto}" style="width:90px;display:none;">`
:''}
</td>

<td>
${m.tipo==='Haber'
?`<span class="monto">${formato(m.monto)}</span>
<input type="number" value="${m.monto}" style="width:90px;display:none;">`
:''}
</td>

<td>
<button class="btn-editar-mov" data-editando="false" onclick="editarMovimiento(${i})">✏</button>
<button class="btn-eliminar" onclick="eliminarMovimiento(${i})">X</button>
</td>

</tr>`;
if(m.tipo==="Debe") d+=m.monto; else h+=m.monto;
});

html+=`<tr><th>Total</th><th>${formato(d)}</th><th>${formato(h)}</th><th></th></tr></table>`;
document.getElementById("previewPoliza").innerHTML=html;
}

function finalizarPoliza(){
const fechaPoliza=document.getElementById("fechaPoliza").value;
if(!fechaPoliza){mostrarError("Selecciona la fecha de la póliza.");return;}
if(polizaActual.length===0){mostrarError("La póliza está vacía.");return;}
let d=0,h=0;
polizaActual.forEach(m=>{if(m.tipo==="Debe")d+=m.monto;else h+=m.monto;});
if(Math.abs(d-h)>0.01){
mostrarError("La póliza no está cuadrada.");return;
}

if(editandoPoliza!==null){

function generarTextoCuentaT(nombreCuenta){

let debeArr = [];
let haberArr = [];
let dTotal = 0;
let hTotal = 0;

// recorrer todas las pólizas
polizas.forEach(p=>{
p.movimientos.forEach(m=>{
if(m.cuenta === nombreCuenta){

if(m.tipo === "Debe"){
debeArr.push(`P${p.numero}: ${formato(m.monto)}`);
dTotal += m.monto;
}else{
haberArr.push(`P${p.numero}: ${formato(m.monto)}`);
hTotal += m.monto;
}

}
});
});

// saldo
let saldo = dTotal - hTotal;

// construir texto limpio
let texto = `${nombreCuenta}\n\n`;

// Debe
texto += "Debe\n\n";
debeArr.forEach(l => texto += l + "\n");
texto += `\n${formato(dTotal)}\n\n`;

// Haber
texto += "Haber\n\n";
haberArr.forEach(l => texto += l + "\n");
texto += `\n${formato(hTotal)}\n\n`;

// saldo
if(saldo > 0){
texto += `Saldo Deudor: ${formato(saldo)}`;
}else if(saldo < 0){
texto += `Saldo Acreedor: ${formato(Math.abs(saldo))}`;
}

return texto;
}

/* -------------------------
    Calculator ...
---------------------------*/
var result;
var smallResult;
var cal = false;
var val_1 = false;
var val_2 = false;
var oper = '+';
var operPressed = false;
var tot = 0;
var cal_done = false;
var currentStatus = 0;
var o;

function num(val) {
	val = val.toString(); // converting to string so it won't be added together in display (2 + '2' should not do '22')

	if (cal_done)
		// if calculation is done
		cls(); // clear everything

	if (!operPressed) {
		// if no operator is pressed (means it's first value)
		if (!val_1) val_1 = 0;

		val_1 = val_1 + val;

		val_1 = lengthFix(val_1); // limiting to 12

		result.innerHTML = val_1;
		smallResult.innerHTML = val_1;
		// console.log('num to be calc: ' + val_1);
	}
	if (operPressed) {
		// if operator is pressed (means it's 2nd value)
		if (!val_2) val_2 = 0;

		val_2 = val_2 + val;

		val_2 = lengthFix(val_2); // limiting to 12

		result.innerHTML = val_2;
		smallResult.innerHTML = val_1 + oper + val_2;
		// console.log('2nd num to be calc: ' + val_2);
	}
}

// when /,*,+,- is clicked
function calc(val) {
	if (val_1 && val_2) {
		operPressed = true;
		total();
		oper = val;
	}

	if (cal_done) {
		var x = (val_1 = tot);
		cls();
		val_1 = x;
		val_1 = lengthFix(val_1); // limiting to 12
		result.innerHTML = val; // display which operator is selected
		// var a = smallResult.innerHTML.toString();
		smallResult.innerHTML = +x + val;
		oper = val;
		operPressed = true;
	}

	if (!val_1 || operPressed) {
		return false;
	}

	if (val_1 && !val_2) {
		result.innerHTML = val; // display which operator is selected
		var a = smallResult.innerHTML.toString();
		smallResult.innerHTML = a + val;
		oper = val;
		operPressed = true;
	}
}

function total() {
	if (!val_1) return false;

	if (!val_2 && operPressed) {
		tot = magic(val_1, val_1, oper);
		tot = lengthFix(tot);
	}

	if (val_1 && val_2) {
		tot = magic(val_1, val_2, oper);
		tot = lengthFix(tot);
	}

	tot = parseFloat(tot);

/* 🔥 quitar decimales innecesarios */
if (Number.isInteger(tot)) {
tot = tot.toString();
} else {
tot = tot.toFixed(2).replace(/\.?0+$/, "");
}

	result.innerHTML = tot;
	// smallResult.innerHTML = tot;
	// console.log('total: ' + tot);
}

function magic(a, b, oper) {
	switch (oper) {
		case '+':
			tot = +a + +b;
			cal_done = true;
			break;
		case '-':
			tot = +a - +b;
			cal_done = true;
			break;
		case '/':
			tot = +a / +b;
			cal_done = true;
			break;
		case '*':
			tot = +a * +b;
			cal_done = true;
			break;
		default:
			return false;
	}
	return tot;
}

// clearing everything...
function cls() {
	smallResult.innerHTML = '';
	result.innerHTML = 0;
	val_1 = false;
	val_2 = false;
	oper = '+';
	tot = 0;
	cal_done = false;
	operPressed = false;
}

function lengthFix(o) {
	o = o.toString();

	if (o != 0 || o != '0') {
		if (o.charAt(0) == 0) o = o.slice(1);
	}

	if (o.toString().length > 12) o = o.substring(0, 12);

	return o;
}

document.onkeydown = function(e){

if(e.key === "Enter"){
e.preventDefault();
}

};
	
document.onkeyup = function(e) {
	if (e.which == 110 || e.which == 190) num('.');
	if (e.which == 96 || e.which == 48) num('0');
	if (e.which == 97 || e.which == 49) num('1');
	if (e.which == 98 || e.which == 50) num('2');
	if (e.which == 99 || e.which == 51) num('3');
	if (e.which == 100 || e.which == 52) num('4');
	if (e.which == 101 || e.which == 53) num('5');
	if (e.which == 102 || e.which == 54) num('6');
	if (e.which == 103 || e.which == 55) num('7');
	if (e.which == 104 || e.which == 56) num('8');
	if (e.which == 105 || e.which == 57) num('9');

	if (e.which == 111) calc('/');
	if (e.which == 106) calc('*');
	if (e.which == 107) calc('+');
	if (e.which == 109) calc('-');

	if (e.key === "Enter") {
	e.preventDefault();
	total();
	return;
	}

	if (e.which == 8 || e.which == 46) cls();

	if (e.which == 27) cls();
	/* 🔥 ATAJOS F1-F4 */
	if (e.key === "F2") { e.preventDefault(); calc('+'); }
	if (e.key === "F8") { e.preventDefault(); calc('-'); }
	if (e.key === "F9") { e.preventDefault(); calc('*'); }
	if (e.key === "¿") { e.preventDefault(); calc('/'); }
};
